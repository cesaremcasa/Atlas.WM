# v3.0 hybrid static decomposition experiment.
# Active config for Block 5+ training runs.

_base: "../base.yaml"

model:
  d_static_immutable: 16
  d_static_slow: 16
  d_dynamic: 32
  d_controllable: 32
  input_dim: 6

training:
  batch_size: 256
  learning_rate: 3.0e-4
  num_epochs: 100
  early_stopping_patience: 15
  grad_clip_norm: 0.5
  lambda_slow_drift: 0.1
  lambda_intervention: 0.5
  lambda_action_invariance: 0.1
