# v3.0 hybrid static decomposition — default training config.
# Fixed physics; validates the AD-2 architectural guarantee.

_base: "../base.yaml"

model:
  d_static_immutable: 8
  d_static_slow: 8
  d_dynamic: 32
  d_controllable: 16
  input_dim: 6

training:
  batch_size: 256
  learning_rate: 3.0e-4
  num_epochs: 100
  early_stopping_patience: 15
  grad_clip_norm: 0.5
  lr_scheduler_patience: 3
  lr_scheduler_factor: 0.5
  lambda_recon: 1.0
  lambda_slow_drift: 0.1
  lambda_action_invariance: 0.01
  lambda_var_penalty: 0.001
