# Atlas.WM base configuration — defaults inherited by all experiments.
# Override values in configs/experiments/*.yaml

model:
  # Latent layout: z_full = [z_static(16) | z_dynamic(32) | z_controllable(16)] = 64 dims
  # z_static = [z_static_immutable(8) | z_static_slow(8)]  (AD-2)
  d_static_immutable: 8    # hard passthrough — bit-identical across time (AD-2)
  d_static_slow: 8         # soft residual with drift penalty (AD-2)
  d_dynamic: 32
  d_controllable: 16
  input_dim: 6             # 3 objects × 2 coords (per frame)
  frame_stack: 2           # stacked frames; 2 makes velocity observable (v4 B6, M2)

environment:
  grid_size: 20
  n_objects: 3
  dt: 0.5
  gravity: 5.0
  friction_agent: 0.96
  friction_box: 0.98
  action_space_size: 8
  # Block 12 — variable physics & process noise. Defaults keep fixed physics.
  randomize_physics: false
  process_noise_std: 0.0
  gravity_range: [2.0, 8.0]
  friction_agent_range: [0.90, 0.99]
  friction_box_range: [0.95, 0.995]

data:
  data_dir: "data/processed"
  num_samples: 50000
  train_val_test_split: [0.8, 0.1, 0.1]

training:
  seed: 42                 # seeds model init, batch order, numpy/python RNGs (AD-7)
  batch_size: 256
  learning_rate: 3.0e-4
  num_epochs: 100
  early_stopping_patience: 15
  grad_clip_norm: 0.5
  lr_scheduler_patience: 3
  lr_scheduler_factor: 0.5
  lambda_recon: 1.0
  lambda_slow_drift: 0.1
  lambda_action_invariance: 0.001  # reduced; 0.01 caused adversarial instability
  lambda_var_penalty: 0.001
  lambda_latent_l2: 0.01        # anchors ‖z_full‖; stops self-predictive representation explosion
  lambda_physics: 0.0          # supervised physics aux loss; 0 = disabled (no labels)
  adv_warmup_epochs: 5          # epochs before adversarial loss is applied
  critic_lr_factor: 1.0         # critic LR = learning_rate * critic_lr_factor

belief_encoder:
  window_k: 10                 # GRU window length; ~10 steps to identify gravity/friction

checkpointing:
  checkpoint_dir: "checkpoints"
  atlas_schema_version: "3.0.0"

logging:
  use_wandb: false
  project_name: "atlas-wm"
  log_interval: 100
