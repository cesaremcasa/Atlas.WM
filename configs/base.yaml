# Atlas.WM base configuration — defaults inherited by all experiments.
# Override values in configs/experiments/*.yaml

model:
  d_static_immutable: 16   # architectural passthrough (AD-2)
  d_static_slow: 16        # soft residual with drift penalty (AD-2)
  d_dynamic: 32
  d_controllable: 32
  input_dim: 6             # 3 objects x 2 coords

environment:
  grid_size: 20
  n_objects: 3
  dt: 0.5
  gravity: 5.0
  friction_agent: 0.96
  friction_box: 0.98
  action_space_size: 8

data:
  data_dir: "data/processed"
  num_samples: 50000
  train_val_test_split: [0.8, 0.1, 0.1]

training:
  batch_size: 256
  learning_rate: 3.0e-4
  num_epochs: 100
  early_stopping_patience: 15
  grad_clip_norm: 0.5
  lr_scheduler_patience: 3
  lr_scheduler_factor: 0.5
  lambda_slow_drift: 0.1
  lambda_intervention: 0.5
  lambda_action_invariance: 0.1

checkpointing:
  checkpoint_dir: "checkpoints"
  atlas_schema_version: "3.0.0"

logging:
  use_wandb: false
  project_name: "atlas-wm"
  log_interval: 100
