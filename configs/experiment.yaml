model:
  d_static: 32
  d_dynamic: 64
  d_controllable: 32
  input_channels: 3

data:
  grid_size: 10
  num_episodes: 100
  sequence_length: 50
  train_val_test_split: [0.8, 0.1, 0.1]

training:
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 10
  checkpoint_interval: 1000

logging:
  use_wandb: false
  project_name: "atlas-wm"
  log_interval: 100
