name: Train Canary (Determinism)

on:
  schedule:
    - cron: "0 8 * * MON"
  workflow_dispatch:

jobs:
  canary:
    name: Determinism canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Run determinism canary
        run: pytest tests/integration/test_determinism_canary.py -v
