name: CI

on:
  pull_request:
  push:
    branches: [main]

# Install the fully-pinned, hash-verified toolchain from requirements.lock (AD-8)
# so CI is reproducible and matches local development byte-for-byte.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install uv
        run: pip install uv
      - name: Install pinned toolchain
        run: uv pip install --system -r requirements.lock
      - name: ruff check
        run: ruff check src/ tests/ scripts/
      - name: ruff format check
        run: ruff format --check src/ tests/ scripts/

  type:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install uv
        run: pip install uv
      - name: Install pinned toolchain + package
        run: |
          uv pip install --system -r requirements.lock
          uv pip install --system -e . --no-deps
      - name: mypy
        run: mypy src/atlas_wm

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install uv
        run: pip install uv
      - name: Install pinned toolchain + package
        run: |
          uv pip install --system -r requirements.lock
          uv pip install --system -e . --no-deps
      - name: Run tests
        run: pytest -q --cov=atlas_wm --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install uv
        run: pip install uv
      - name: Install pinned toolchain
        run: uv pip install --system -r requirements.lock
      - name: bandit
        run: bandit -r src/ -ll
      - name: pip-audit
        run: pip-audit -r requirements.lock --progress-spinner off
      - name: Forbid pickle in production code
        run: |
          ! grep -rE "torch\.load|pickle\.load|torch\.save" src/atlas_wm/ \
            $(find scripts/ -name "*.py" ! -name "migrate_pt_to_safetensors.py")
      - name: Forbid legacy encoder imports in production
        run: |
          ! grep -rE "from .*structured_encoder|import.*structured_encoder" src/atlas_wm/ scripts/ tests/
      - name: Verify SBOM is valid JSON
        run: python -c "import json; json.load(open('sbom.json'))" && echo "SBOM OK"
