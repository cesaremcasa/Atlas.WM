name: Chaos Physics Tripwire

on:
  schedule:
    - cron: "0 8 * * MON"
  workflow_dispatch:

jobs:
  chaos:
    name: Physics tripwire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Run chaos tripwire
        run: python scripts/chaos_physics.py
